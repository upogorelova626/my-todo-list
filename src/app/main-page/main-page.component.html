<div class="main-page">
    <app-sidebar
        [currentPage]="currentPage"
        (pageChange)="setPage($event)"
    ></app-sidebar>

    <div class="main-content">
        <app-header></app-header>

        @if (currentPage === 'tasks') {
            <app-task-list></app-task-list>
        } @else {
            <app-settings></app-settings>
        }
    </div>
</div>
